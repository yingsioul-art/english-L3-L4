<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英文學習站 L3 · L4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--card2:#f7f9fc;--border:#dde3ee;
  --shadow:0 2px 16px rgba(60,80,140,.10);
  --accent:#2d6be4;--accent2:#e05c5c;--teal:#1aaccf;
  --green:#27a86a;--purple:#7c5cbf;--gold:#d4920a;
  --text:#1a2340;--muted:#5a6a8a;--radius:14px;
  --font:'Microsoft YaHei','微軟雅黑','PingFang TC','Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.app{max-width:860px;margin:0 auto;padding:14px;}

.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--accent);border-radius:var(--radius);padding:12px 18px;margin-bottom:10px;box-shadow:0 4px 18px rgba(45,107,228,.25);}
.logo{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;}
.logo span{color:#ffe082;}
.hdr-right{display:flex;gap:7px;}
.badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:800;color:#fff;}

/* LESSON SWITCHER */
.lesson-sw{display:flex;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:10px;box-shadow:var(--shadow);}
.lbtn{
  flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:10px;
  background:var(--card2);color:var(--muted);font-family:var(--font);
  font-weight:900;font-size:13px;cursor:pointer;transition:all .2s;text-align:center;
}
.lbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(45,107,228,.3);}
.lbtn:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.lbtn .ltag{font-size:11px;opacity:.8;display:block;margin-top:2px;}

.unit-nav{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px;margin-bottom:10px;box-shadow:var(--shadow);}
.unav{padding:7px 3px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:var(--font);font-weight:800;font-size:10.5px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.unav .ui{font-size:17px;line-height:1;}
.unav.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(45,107,228,.3);}
.unav.done{color:var(--green);}
.unav:hover:not(.on){background:var(--card2);}

.panel{display:none;animation:fadeU .25s ease;}
.panel.on{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow);}
.stitle{font-family:'Fredoka One',cursive;font-size:17px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

.prog-wrap{background:var(--card2);border-radius:100px;height:7px;margin-bottom:12px;border:1px solid var(--border);}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .5s ease;}

.group-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.gpill{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:800;border:1.5px solid var(--border);color:var(--muted);background:var(--card2);cursor:pointer;transition:all .2s;}
.gpill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* FLASHCARD */
.fc-scene{perspective:1200px;cursor:pointer;margin-bottom:12px;min-height:210px;}
.fc-inner{position:relative;width:100%;min-height:210px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;width:100%;min-height:210px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.fc-front{background:linear-gradient(135deg,#e8f0ff,#f0f7ff);border:2px solid #c8d8f8;}
.fc-back{background:linear-gradient(135deg,#e6f7f0,#f0faf6);border:2px solid #b2e0cc;transform:rotateY(180deg);}
.fc-en{font-size:28px;font-weight:900;color:var(--accent);margin-bottom:5px;}
.fc-pos{font-size:11px;color:var(--accent2);font-weight:800;margin-bottom:3px;text-transform:uppercase;}
.fc-zh{font-size:20px;color:var(--text);font-weight:800;margin-bottom:3px;}
.fc-tip{font-size:11px;color:var(--muted);margin-top:6px;}
.fc-ex{font-size:13.5px;color:#2a6a4a;line-height:1.75;margin:7px 0;}
.fc-ex .kw{color:var(--accent);font-weight:900;border-bottom:2px solid var(--accent);}
.btn-row2{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:5px;}
.ic-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.ic-btn:hover{border-color:var(--accent);color:var(--accent);background:#eef3ff;}
.ic-btn.purple{border-color:var(--purple);color:var(--purple);}
.ic-btn.purple:hover{background:#f0eeff;}
.chunk-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:8px;text-align:left;display:none;}
.chunk-box.on{display:block;animation:fadeU .2s ease;}
.chunk-ttl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--purple);font-weight:900;margin-bottom:7px;}
.chunk-item{padding:6px 0;border-bottom:1px solid var(--border);}
.chunk-item:last-child{border-bottom:none;}
.chunk-en{font-size:13px;color:var(--teal);font-weight:800;}
.chunk-zh{font-size:12px;color:var(--muted);margin-top:2px;}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fc-ctr{font-size:13px;color:var(--muted);font-weight:800;}

.btn{padding:8px 18px;border:none;border-radius:9px;font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;transition:all .18s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2558c8;transform:translateY(-1px);}
.btn-secondary{background:var(--card2);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-danger{background:#fef0f0;color:var(--accent2);border:1.5px solid #f8cccc;}
.action-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;}

/* SPELLING */
.qblock{background:var(--card2);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.qtext{font-size:14.5px;font-weight:800;line-height:1.6;margin-bottom:12px;}
.qtext .en-big{font-size:22px;color:var(--accent);display:block;margin:5px 0;}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.choice-btn{padding:10px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-weight:800;font-size:13.5px;cursor:pointer;transition:all .18s;text-align:left;}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#eef3ff;}
.choice-btn.ok{border-color:var(--green);background:#eefbf4;color:var(--green);}
.choice-btn.no{border-color:var(--accent2);background:#fef0f0;color:var(--accent2);}
.choice-btn.rev{border-color:var(--green);color:var(--green);}

.sp-hint{background:linear-gradient(90deg,#fff8e0,#fffbe8);border:1.5px solid #f0d060;border-radius:9px;padding:9px 14px;font-size:13.5px;text-align:center;margin-bottom:10px;}
.sp-hint .syl{color:var(--purple);font-weight:900;}
.sp-hint .hint-txt{color:var(--gold);font-weight:900;font-size:17px;letter-spacing:3px;}
.sp-input{width:100%;padding:11px 13px;background:#fff;border:2px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:17px;font-weight:800;text-align:center;letter-spacing:2px;outline:none;transition:border-color .2s;}
.sp-input:focus{border-color:var(--accent);}

.hw-label{font-size:24px;font-weight:900;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:2px;}
.hw-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px;}
#hwCanvas{border:2px solid var(--border);border-radius:12px;background:#fff;cursor:crosshair;display:block;margin:0 auto 8px;touch-action:none;}

.sent-en{font-size:15px;font-weight:800;line-height:1.7;margin-bottom:5px;}
.sent-en .hl{color:var(--accent);background:#e8f0ff;border-radius:4px;padding:1px 5px;border-bottom:2px solid var(--accent);}
.sent-zh{font-size:12px;color:var(--muted);margin-bottom:7px;}
.sent-task{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:9px;}
.textarea{width:100%;padding:10px 12px;background:#fff;border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:65px;outline:none;transition:border-color .2s;}
.textarea:focus{border-color:var(--accent);}

.fb{margin-top:9px;padding:11px 13px;border-radius:9px;font-size:13px;line-height:1.75;display:none;}
.fb.on{display:block;animation:fadeU .25s ease;}
.fb.great{background:#eefbf4;border:1px solid #b2e0cc;}
.fb.good{background:#e8f5fb;border:1px solid #a8d8ee;}
.fb.retry{background:#fef0f0;border:1px solid #f8cccc;}
.fb-lv{font-weight:900;font-size:14px;margin-bottom:3px;}
.fb.great .fb-lv{color:var(--green);}
.fb.good .fb-lv{color:var(--teal);}
.fb.retry .fb-lv{color:var(--accent2);}

.gram-q{font-size:14.5px;font-weight:800;line-height:1.7;margin-bottom:12px;}
.gram-blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--accent);margin:0 4px;vertical-align:bottom;}
.gram-exp{margin-top:9px;padding:11px 13px;background:#fffbe8;border-radius:8px;font-size:13px;line-height:1.75;display:none;border-left:4px solid var(--gold);color:#6a4800;}
.gram-exp.on{display:block;}

.passage{background:#f5fbf8;border-radius:12px;padding:15px;font-size:13.5px;line-height:2.1;margin-bottom:12px;border:1px solid #b2e0cc;border-left:4px solid var(--green);}
.ptitle{font-family:'Fredoka One',cursive;font-size:14px;color:var(--green);margin-bottom:8px;}
.opts-row{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0;}
.obtn{padding:6px 13px;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;transition:all .18s;}
.obtn:hover:not(:disabled){border-color:var(--teal);background:#e8f8f4;}
.obtn.o-ok{border-color:var(--green);color:var(--green);background:#eefbf4;}
.obtn.o-no{border-color:var(--accent2);color:var(--accent2);background:#fef0f0;}
.exp-box{margin-top:5px;padding:8px 12px;background:#eefbf4;border-radius:8px;font-size:13px;color:#2a6a4a;border:1px solid #b2e0cc;display:none;}
.cap-note{margin-top:9px;padding:10px 13px;font-size:13px;color:#0a5a7a;background:#e8f5fb;border:1px solid #a8d8ee;border-radius:9px;}
.cap-badge{display:inline-flex;align-items:center;gap:5px;background:#fef0f0;border:1px solid #f8cccc;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:900;color:var(--accent2);margin-bottom:9px;}
.order-bar{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:7px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;}
.order-bar label{font-size:12px;color:var(--muted);font-weight:800;flex:1;}
.order-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.order-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.order-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.wnum{display:inline-block;min-width:28px;font-size:12px;color:var(--muted);font-weight:800;vertical-align:middle;}

.xp-pop{position:fixed;top:64px;right:16px;z-index:999;background:var(--gold);color:#fff;font-family:'Fredoka One',cursive;font-size:15px;padding:5px 14px;border-radius:100px;box-shadow:0 4px 14px rgba(212,146,10,.4);animation:xpUp 1.4s ease forwards;pointer-events:none;}
@keyframes xpUp{0%{opacity:0;transform:translateY(14px) scale(.85);}20%{opacity:1;transform:translateY(-8px) scale(1.1);}70%{opacity:1;transform:translateY(-24px);}100%{opacity:0;transform:translateY(-42px) scale(.9);}}
@keyframes fadeU{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.summary{background:linear-gradient(135deg,#e6fbf0,#eef7ff);border:2px solid var(--green);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:12px;display:none;}
.summary.on{display:block;animation:fadeU .4s ease;}
.sum-title{font-family:'Fredoka One',cursive;font-size:21px;color:var(--green);margin-bottom:10px;}
.sum-row{display:flex;justify-content:center;gap:24px;margin:12px 0;}
.snum{font-family:'Fredoka One',cursive;font-size:32px;color:var(--accent);}
.slbl{font-size:11px;color:var(--muted);font-weight:800;}

/* ── DIALOGUE ── */
.dial-controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;align-items:center;}
.dial-controls label{font-size:12px;color:var(--muted);font-weight:800;flex:1;}
.mode-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.mode-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.mode-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.dial-scene{background:var(--card2);border-left:4px solid var(--gold);border-radius:8px;padding:8px 14px;margin-bottom:8px;font-size:13px;color:var(--gold);font-weight:800;}
.dial-line{display:flex;gap:10px;padding:9px 12px;border-radius:9px;border:1px solid var(--border);margin-bottom:6px;background:var(--card);transition:background .15s;cursor:pointer;}
.dial-line:hover{background:#eef3ff;}
.dial-line.scene-line{background:var(--card2);cursor:default;}
.dial-line.scene-line:hover{background:var(--card2);}
.dial-speaker{font-weight:900;font-size:13px;min-width:72px;padding-top:2px;flex-shrink:0;}
.sp-yash,.sp-lisa{color:var(--teal);}
.sp-mswang,.sp-joe{color:var(--accent);}
.sp-may{color:var(--purple);}
.dial-body{flex:1;}
.dial-en{font-size:14px;font-weight:700;line-height:1.6;color:var(--text);}
.dial-en .kw{background:#e8f0ff;color:var(--accent);border-radius:3px;padding:0 3px;font-weight:900;border-bottom:2px solid var(--accent);}
.dial-zh{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
.dial-note{font-size:11.5px;color:var(--green);margin-top:4px;background:#eefbf4;border-radius:5px;padding:3px 7px;display:none;}
.dial-note.show{display:block;}
.dial-snd{background:rgba(45,107,228,.1);border:1px solid rgba(45,107,228,.25);border-radius:100px;padding:3px 10px;font-size:11px;font-weight:800;color:var(--accent);cursor:pointer;margin-top:4px;display:inline-block;}
.dial-snd:hover{background:rgba(45,107,228,.2);}
.zh-toggle{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.zh-toggle.on{border-color:var(--green);color:var(--green);background:#eefbf4;}
/* fill-in-the-blank for dialogue */
.fill-card{background:var(--card2);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.fill-speaker{font-weight:900;font-size:13px;color:var(--accent);margin-bottom:6px;}
.fill-zh{font-size:13px;color:var(--muted);margin-bottom:9px;}
.fill-en{font-size:15px;font-weight:700;line-height:1.7;margin-bottom:10px;color:var(--text);}
.fill-input{border:none;border-bottom:2.5px solid var(--accent);background:transparent;font-family:var(--font);font-size:15px;font-weight:800;color:var(--accent);width:110px;text-align:center;outline:none;padding:1px 4px;}
.fill-input:focus{border-color:var(--teal);}
.fill-input.ok{border-color:var(--green);color:var(--green);}
.fill-input.no{border-color:var(--accent2);color:var(--accent2);}
/* ── RANGE SELECTOR ── */
#rangeSelector{background:var(--card);border:1.5px solid var(--accent);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(45,107,228,.12);display:none;}
#rangeSelector.show{display:block;animation:fadeU .25s ease;}
.range-title{font-family:'Fredoka One',cursive;font-size:15px;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.range-tabs{display:flex;gap:6px;margin-bottom:10px;}
.rtab{padding:5px 13px;border-radius:7px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.rtab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.range-pills{display:flex;flex-wrap:wrap;gap:6px;}
.rpill{padding:6px 14px;border-radius:100px;font-size:12.5px;font-weight:800;border:1.5px solid var(--border);color:var(--muted);background:var(--card2);cursor:pointer;transition:all .18s;}
.rpill.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(45,107,228,.25);}
.rpill:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.range-info{margin-top:9px;font-size:12px;color:var(--muted);font-weight:700;}
.range-info span{color:var(--accent);font-weight:900;}
/* custom range picker */
.custom-tools{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.custom-tools label{font-size:12px;color:var(--muted);font-weight:800;}
.range-inp{padding:5px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--font);font-size:12px;font-weight:800;color:var(--text);width:110px;outline:none;background:var(--card2);}
.range-inp:focus{border-color:var(--accent);}
.range-inp-btn{padding:5px 11px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;}
.num-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.nchk{min-width:36px;height:36px;padding:0 6px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);font-family:var(--font);font-weight:900;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;}
.nchk.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(45,107,228,.3);}
.nchk:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.nchk.no-num{font-size:10.5px;min-width:44px;}
.custom-footer{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap;}
.custom-count{font-size:12px;color:var(--muted);font-weight:800;flex:1;}
.custom-count span{color:var(--accent);font-weight:900;}
/* front face sound button */
.fc-front-snd{
  background:rgba(45,107,228,.12);border:1.5px solid rgba(45,107,228,.3);
  border-radius:100px;padding:5px 14px;font-size:12px;font-weight:800;
  color:var(--accent);cursor:pointer;margin-top:8px;transition:all .18s;
}
.fc-front-snd:hover{background:rgba(45,107,228,.22);}

.rdg-controls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;align-items:center;}
.rdg-controls label{font-size:12px;color:var(--muted);font-weight:800;flex:1;}
.rdg-para{border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.rdg-para:hover{box-shadow:0 2px 12px rgba(45,107,228,.15);}

let W, GROUPS, SENTS, GRAMS, READ, DIAL, RDG;
let currentLessonKey='L3';
let activePool=[];   // shared pool for all units 1-4
let rangeTab='cat';  // 'cat' | 'num' | 'custom'
let activeRangeIdx=0; // which pill is selected
let customSelected=new Set(); // word ids selected in custom mode

function applyLesson(key){
  const L=LESSONS[key];
  W=L.words; GROUPS=L.groups; SENTS=L.sents; GRAMS=L.grams; READ=L.read; DIAL=L.dial; RDG=L.rdg;
  document.getElementById('gramTitle').textContent=L.gramTitle;
  document.getElementById('dialTitle').textContent=L.dialTitle;
  document.getElementById('rdgTitle').textContent=L.rdgTitle;
  document.getElementById('sumTitle').textContent='🎉 '+L.label+' 練習完成！';
  s1Shuffled=false;s2Shuffled=false;s3Shuffled=false;
  rangeTab='cat'; activeRangeIdx=0;
  activePool=[...W];
  customSelected=new Set(W.map(w=>w.id));
  renderRangePills();
}

// ── Range Selector ──
function showRangeSelector(show){
  document.getElementById('rangeSelector').classList.toggle('show',show);
}

function renderRangePills(){
  const L=LESSONS[currentLessonKey];
  const pills=document.getElementById('rangePills');
  const customPicker=document.getElementById('customPicker');
  if(rangeTab==='custom'){
    pills.style.display='none';
    customPicker.style.display='block';
    renderNumGrid();
    return;
  }
  pills.style.display='flex';
  customPicker.style.display='none';
  if(rangeTab==='cat'){
    const groups=[{label:L.groupLabels[0],words:L.words},...L.groupLabels.slice(1).map((lb,i)=>({label:lb,words:Object.values(L.groups)[i+1]}))];
    pills.innerHTML=groups.map((g,i)=>`<button class="rpill${i===activeRangeIdx?' on':''}" data-ri="${i}" data-tab="cat">${g.label}</button>`).join('');
    updateRangeInfo(groups[activeRangeIdx].words);
  } else {
    pills.innerHTML=L.numGroups.map((g,i)=>`<button class="rpill${i===activeRangeIdx?' on':''}" data-ri="${i}" data-tab="num">${g.label}</button>`).join('');
    updateRangeInfo(L.numGroups[activeRangeIdx].words);
  }
  document.getElementById('rangePills').addEventListener('click',rangePillClick);
}

function rangePillClick(e){
  const btn=e.target.closest('[data-ri]');
  if(!btn)return;
  const idx=parseInt(btn.dataset.ri);
  activeRangeIdx=idx;
  document.querySelectorAll('#rangePills .rpill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const L=LESSONS[currentLessonKey];
  if(rangeTab==='cat'){
    const groups=[L.words,...Object.values(L.groups).slice(1)];
    activePool=[...groups[idx]];
  } else {
    activePool=[...L.numGroups[idx].words];
  }
  updateRangeInfo(activePool);
  applyActivePool();
}

function updateRangeInfo(pool){
  const txt=document.getElementById('rangeInfoTxt');
  if(txt) txt.textContent=`${pool.length} 個單字（${pool[0]?.en} … ${pool[pool.length-1]?.en}）`;
}

// ── shared helper: push activePool to all units 1-4 and re-render ──
function applyActivePool(){
  fcList=[...activePool];fcIdx=0;
  s1Pool=[...activePool];s1Used=0;
  s2Pool=[...activePool];s2Used=0;
  s3Pool=[...activePool];s3Used=0;
  const au=parseInt(document.querySelector('.unav.on')?.dataset?.unit||'1');
  if(au===1)showCard();
  if(au===2)renderS1();
  if(au===3)renderS2();
  if(au===4)renderS3();
}

// ── Custom Number Picker ──
function renderNumGrid(){
  const grid=document.getElementById('numGrid');
  grid.innerHTML=W.map(w=>{
    const label=w.num||w.en; // show number if exists, else short word
    const isNoNum=!w.num;
    return `<button class="nchk${customSelected.has(w.id)?' on':''}${isNoNum?' no-num':''}" data-wid="${w.id}">${label}</button>`;
  }).join('');
  updateCustomCount();
  grid.addEventListener('click',function(e){
    const btn=e.target.closest('[data-wid]');
    if(!btn)return;
    const id=parseInt(btn.dataset.wid);
    if(customSelected.has(id)){
      customSelected.delete(id);
      btn.classList.remove('on');
    } else {
      customSelected.add(id);
      btn.classList.add('on');
    }
    updateCustomCount();
  });
}

function updateCustomCount(){
  const el=document.getElementById('customCount');
  if(el) el.textContent=customSelected.size;
}

// Apply text range input like "1-10, 15, 20-25"
document.getElementById('rangeInpBtn').addEventListener('click',applyRangeInput);
document.getElementById('rangeInp').addEventListener('keydown',e=>{if(e.key==='Enter')applyRangeInput();});

function applyRangeInput(){
  const val=document.getElementById('rangeInp').value.trim();
  if(!val)return;
  const numSet=new Set();
  val.split(',').forEach(part=>{
    const p=part.trim();
    const m=p.match(/^(\d+)\s*[-–]\s*(\d+)$/);
    if(m){
      const a=parseInt(m[1]),b=parseInt(m[2]);
      for(let i=Math.min(a,b);i<=Math.max(a,b);i++) numSet.add(i);
    } else if(/^\d+$/.test(p)){
      numSet.add(parseInt(p));
    }
  });
  // map num → word id (only for words that have num)
  customSelected.clear();
  W.forEach(w=>{
    if(w.num&&numSet.has(parseInt(w.num))) customSelected.add(w.id);
  });

function initCanvas(w){
  canvas=document.getElementById('hwCanvas');
  if(!canvas)return;
  const maxW=Math.min(480,document.querySelector('.app').offsetWidth-52);
  canvas.width=maxW;canvas.height=120;
  ctx=canvas.getContext('2d');
  function drawLine(){ctx.save();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,88);ctx.lineTo(canvas.width-10,88);ctx.stroke();ctx.restore();}
  drawLine();
  ctx.strokeStyle='#1a2340';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  drawing=false;canvas._w=w;
  function pos(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('mouseleave',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}
document.getElementById('btnClear').addEventListener('click',()=>{
  if(canvas&&ctx){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,88);ctx.lineTo(canvas.width-10,88);ctx.stroke();ctx.restore();ctx.strokeStyle='#1a2340';ctx.lineWidth=3;}
});

function renderRead(){
  let p=READ.passage;
  READ.blanks.forEach(b=>{p=p.replace(`(${b.num})_____`,`<strong style="color:var(--accent)">(${b.num})</strong>`);});
  const blanksHtml=READ.blanks.map((b,i)=>`
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:800;margin-bottom:6px;">空格 (${b.num}) 最佳答案：</div>
      <div class="opts-row" id="opt${i}">
        ${b.opts.map((o,j)=>`<button class="obtn" data-qi="${i}" data-j="${j}" data-ans="${b.ans}" data-exp="${encodeURIComponent(b.exp)}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
      <div class="exp-box" id="rex${i}"></div>
    </div>`).join('');
  document.getElementById('readArea').innerHTML=`
    <div class="cap-badge">🏆 類會考克漏字</div>
    <div class="passage"><div class="ptitle">${READ.title}</div>${p}</div>
    <div style="font-family:'Fredoka One',cursive;font-size:14px;color:var(--accent);margin-bottom:10px;">選出最佳答案：</div>
    ${blanksHtml}
    <div class="cap-note">${READ.cap}</div>`;
  document.querySelectorAll('.obtn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const qi=parseInt(this.dataset.qi),j=parseInt(this.dataset.j);
      const ans=parseInt(this.dataset.ans),exp=decodeURIComponent(this.dataset.exp);
      document.querySelectorAll(`#opt${qi} .obtn`).forEach(b=>b.disabled=true);
      this.classList.add(j===ans?'o-ok':'o-no');
      if(j!==ans)document.querySelector(`#opt${qi} [data-j="${ans}"]`).classList.add('o-ok');
      const box=document.getElementById('rex'+qi);box.textContent='✅ '+exp;box.style.display='block';
      if(j===ans){addXP(8);readDone++;if(readDone===READ.blanks.length)markDone(7);}
    });
  });
}

//  HELPERS
// ══════════════════════════════════════════════════
function setProg(id,pct){const el=document.getElementById(id);if(el)el.style.width=pct+'%';}
function markDone(unit){
  const btn=document.querySelector(`[data-unit="${unit}"]`);
  if(btn)btn.classList.add('done');
  if(document.querySelectorAll('.unav.done').length>=5){
    document.getElementById('summary').classList.add('on');
    document.getElementById('sXP').textContent=XP;
    document.getElementById('sFlip').textContent=flipCount;
    document.getElementById('sSpell').textContent=s1Score+s2Score+s3Score;
    document.getElementById('summary').scrollIntoView({behavior:'smooth'});
  }
}
function shuffle(arr){return arr.sort(()=>Math.random()-.5);}
function speak(txt){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════════════════
//  UNIT 8: DIALOGUE
// ══════════════════════════════════════════════════
// helper: highlight key words in text
function highlightKeys(text, keys) {
  if(!keys||keys.length===0) return escHtml(text);
  let result = escHtml(text);
  const sorted = [...keys].sort((a,b)=>b.length-a.length);
  sorted.forEach(k=>{
    const re=new RegExp('('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    result=result.replace(re,'<span class="kw">$1</span>');
  });
  return result;
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderDial(){
  // sync button states
  const readBtn=document.getElementById('dialModeRead');
  const fillBtn=document.getElementById('dialModeFill');
  const zhBtn=document.getElementById('zhToggle');
  const fillBtns=document.getElementById('fillBtns');

  if(dialMode==='read'){
    readBtn.classList.add('on');fillBtn.classList.remove('on');
    fillBtns.style.display='none';
    renderDialRead();
  } else {
    fillBtn.classList.add('on');readBtn.classList.remove('on');
    fillBtns.style.display='flex';
    renderDialFill();
  }
  zhBtn.classList.toggle('on',showZh);
}

function renderDialRead(){
  const html = DIAL.map((line,i)=>{
    if(line.type==='scene'){
      return `<div class="dial-line scene-line"><div class="dial-body"><div class="dial-en" style="color:var(--gold);font-size:13px;">📍 ${escHtml(line.text)}</div></div></div>`;
    }
    const enHtml = highlightKeys(line.en, line.keys);
    const spClass = 'sp-'+line.sp;
    const noteId = 'note-'+i;
    return `<div class="dial-line" data-i="${i}">
      <div class="dial-speaker ${spClass}">${escHtml(line.speaker)}</div>
      <div class="dial-body">
        <div class="dial-en">${enHtml}</div>
        <div class="dial-zh" style="display:${showZh?'block':'none'}">${escHtml(line.zh)}</div>
        ${line.note?`<div class="dial-note" id="${noteId}">💡 ${escHtml(line.note)}</div>`:''}
        <button class="dial-snd" data-en="${escHtml(line.en)}">🔊 聽發音</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('dialArea').innerHTML=html;

  // bind sound buttons
  document.querySelectorAll('#dialArea .dial-snd').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      speak(this.dataset.en);
    });
  });
  // bind line click → toggle note
  document.querySelectorAll('#dialArea .dial-line:not(.scene-line)').forEach(line=>{
    line.addEventListener('click',function(){
      const i=this.dataset.i;
      const note=document.getElementById('note-'+i);
      if(note) note.classList.toggle('show');
    });
  });
}

// fill-in-the-blank: uses lines that have keys
function getDialFillLines(){
  return DIAL.filter(l=>l.type!=='scene'&&l.keys&&l.keys.length>0);
}
function renderDialFill(){
  const fillLines=getDialFillLines();
  if(!fillLines.length){document.getElementById('dialArea').innerHTML='<div style="color:var(--muted);padding:20px;text-align:center;">本課對話無填空題目</div>';return;}
  const line=fillLines[dialFillIdx%fillLines.length];
  const total=fillLines.length;
  const progress=Math.round(dialFillIdx/total*100);
  setProg('dialProg',Math.min(100,Math.round(dialFillScore/total*100)));

  // blank out first key word
  const blankWord=line.keys[0];
  const blankedEn=line.en.replace(
    new RegExp('('+blankWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i'),
    `<input class="fill-input" id="fillInp" placeholder="${'_'.repeat(blankWord.length)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`
  );
  const spClass='sp-'+line.sp;

  document.getElementById('dialArea').innerHTML=`
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:800;">第 ${(dialFillIdx%total)+1} / ${total} 題</div>
    <div class="fill-card">
      <div class="fill-speaker ${spClass}">🗣️ ${line.speaker} 說：</div>
      <div class="fill-zh">（${line.zh}）</div>
      <div class="fill-en">${blankedEn}</div>
      <div class="fb" id="fillFb"></div>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--muted);">💡 點選任意位置可聽完整句子發音
      <button class="dial-snd" id="fillSnd">🔊 聽完整句子</button>
    </div>`;

  document.getElementById('fillSnd').addEventListener('click',()=>speak(line.en));
  const inp=document.getElementById('fillInp');
  if(inp){setTimeout(()=>inp.focus(),80);}
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkDialFill(line,blankWord);});
}

function checkDialFill(line, blankWord){
  const inp=document.getElementById('fillInp');
  if(!inp||inp.disabled)return;
  const ans=inp.value.trim().toLowerCase();
  inp.disabled=true;
  const fb=document.getElementById('fillFb');
  const correct=blankWord.toLowerCase();
  if(ans===correct){
    inp.classList.add('ok');
    fb.className='fb on great';
    fb.innerHTML=`<div class="fb-lv">🌟 答對了！</div>正確答案：<strong style="color:var(--accent)">${blankWord}</strong><br><span style="font-size:12px;color:var(--teal)">💡 ${line.note||''}</span>`;
    addXP(8);dialFillScore++;
    const fillLines=getDialFillLines();
    setProg('dialProg',Math.min(100,Math.round(dialFillScore/fillLines.length*100)));
    if(dialFillScore>=fillLines.length)markDone(8);
  } else {
    inp.classList.add('no');
    fb.className='fb on retry';
    fb.innerHTML=`<div class="fb-lv">💪 再想想</div>正確答案是：<strong style="color:var(--accent)">${blankWord}</strong><br><span style="font-size:12px;color:var(--teal)">💡 ${line.note||''}</span><br>
      <button class="btn btn-danger" id="retryDial" style="margin-top:7px;font-size:12px;">再試一次 🔄</button>`;
    setTimeout(()=>{const rb=document.getElementById('retryDial');if(rb)rb.addEventListener('click',()=>{inp.value='';inp.disabled=false;inp.classList.remove('no');fb.className='fb';setTimeout(()=>inp.focus(),50);});},50);
  }
}

// button event bindings for dialogue panel
document.getElementById('dialModeRead').addEventListener('click',function(){
  dialMode='read';renderDial();
});
document.getElementById('dialModeFill').addEventListener('click',function(){
  dialMode='fill';renderDial();
});
document.getElementById('zhToggle').addEventListener('click',function(){
  showZh=!showZh;
  this.classList.toggle('on',showZh);
  if(dialMode==='read'){
    document.querySelectorAll('#dialArea .dial-zh').forEach(el=>{el.style.display=showZh?'block':'none';});
  }
});
document.getElementById('btnCheckFill').addEventListener('click',()=>{
  const line=getDialFillLines()[dialFillIdx%getDialFillLines().length];
  checkDialFill(line,line.keys[0]);
});
document.getElementById('btnNextFill').addEventListener('click',()=>{dialFillIdx++;renderDialFill();});

function renderRdg(){
  const readBtn=document.getElementById('rdgModeRead');
  const fillBtn=document.getElementById('rdgModeFill');
  const zhBtn=document.getElementById('rdgZhToggle');
  const fillBtns=document.getElementById('rdgFillBtns');
  if(rdgMode==='read'){
    readBtn.classList.add('on');fillBtn.classList.remove('on');
    fillBtns.style.display='none';
    renderRdgRead();
  } else {
    fillBtn.classList.add('on');readBtn.classList.remove('on');
    fillBtns.style.display='flex';
    renderRdgFill();
  }
  zhBtn.classList.toggle('on',rdgShowZh);
}

function renderRdgRead(){
  const html=RDG.map((p,i)=>{
    const enHtml=highlightKeys(p.en,p.keys);
    const notesHtml=p.notes.map(n=>`<div class="rdg-note-item">💡 ${escHtml(n)}</div>`).join('');
    return `
    <div class="rdg-para" data-pi="${i}">
      <div class="rdg-para-hdr">
        <span class="rdg-num">${i+1}</span>
        <span class="rdg-title">${escHtml(p.title)}</span>
        <span class="rdg-toggle" id="rdg-tog-${i}">▶ 展開</span>
      </div>
      <div class="rdg-body" id="rdg-body-${i}">
        <div class="rdg-en">${enHtml}</div>
        <div class="rdg-zh" style="display:${rdgShowZh?'block':'none'}">${escHtml(p.zh)}</div>
        <button class="rdg-snd" data-en="${escHtml(p.en)}">🔊 聽全段</button>
        <div class="rdg-notes" style="margin-top:10px;">${notesHtml}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('rdgArea').innerHTML=html;

  // toggle open/close
  document.querySelectorAll('#rdgArea .rdg-para').forEach(para=>{
    para.addEventListener('click',function(e){
      if(e.target.closest('.rdg-snd'))return;
      const i=this.dataset.pi;
      const body=document.getElementById('rdg-body-'+i);
      const tog=document.getElementById('rdg-tog-'+i);
      const isOpen=body.classList.contains('open');
      body.classList.toggle('open',!isOpen);
      tog.textContent=isOpen?'▶ 展開':'▼ 收起';
      if(!isOpen){
        addXP(3);rdgFillScore++;
        setProg('rdgProg',Math.min(100,Math.round(rdgFillScore/RDG.length*100)));
        if(rdgFillScore>=RDG.length)markDone(9);
      }
    });
  });
  // sound buttons
  document.querySelectorAll('#rdgArea .rdg-snd').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();speak(this.dataset.en);
    });
  });
}

function renderRdgFill(){
  const para=RDG[rdgFillIdx%RDG.length];
  const total=RDG.length;
  const blankWord=para.fill.answer;
  // blank out the answer in the sentence
  const blankedEn=para.fill.blank.replace(
    new RegExp('('+blankWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i'),
    `<input class="fill-input" id="rdgFillInp" placeholder="${'_'.repeat(blankWord.length)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`
  );
  document.getElementById('rdgArea').innerHTML=`
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:800;">段落 ${(rdgFillIdx%total)+1} / ${total}　｜　${escHtml(para.title)}</div>
    <div class="rdg-fill-card">
      <div class="rdg-fill-label">📖 根據中文提示，填入正確的英文單字或片語：</div>
      <div class="rdg-fill-en" style="color:var(--teal);font-size:13px;margin-bottom:10px;">${escHtml(para.zh)}</div>
      <div class="rdg-fill-en">${blankedEn}</div>
      <div class="fb" id="rdgFillFb"></div>
    </div>
    <div style="margin-top:6px;">
      <button class="rdg-snd" id="rdgFillSnd">🔊 聽完整句子</button>
    </div>`;

  document.getElementById('rdgFillSnd').addEventListener('click',()=>speak(para.fill.blank.replace(/___+/,' ')));
  const inp=document.getElementById('rdgFillInp');
  if(inp){setTimeout(()=>inp.focus(),80);}
  if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkRdgFill(para);});
}

function checkRdgFill(para){
  const inp=document.getElementById('rdgFillInp');
  if(!inp||inp.disabled)return;
  const ans=inp.value.trim().toLowerCase();
  inp.disabled=true;
  const fb=document.getElementById('rdgFillFb');
  const correct=para.fill.answer.toLowerCase();
  if(ans===correct){
    inp.classList.add('ok');
    fb.className='fb on great';
    fb.innerHTML=`<div class="fb-lv">🌟 答對了！</div>正確答案：<strong style="color:var(--accent)">${para.fill.answer}</strong><br><span style="font-size:12px;color:var(--teal)">💡 ${para.fill.hint}</span>`;
    addXP(8);rdgFillScore++;
    setProg('rdgProg',Math.min(100,Math.round(rdgFillScore/RDG.length*100)));
    if(rdgFillScore>=RDG.length)markDone(9);
  } else {
    inp.classList.add('no');
    fb.className='fb on retry';
    fb.innerHTML=`<div class="fb-lv">💪 再想想</div>正確答案：<strong style="color:var(--accent)">${para.fill.answer}</strong><br><span style="font-size:12px;color:var(--teal)">💡 ${para.fill.hint}</span><br>
      <button class="btn btn-danger" id="retryRdg" style="margin-top:7px;font-size:12px;">再試一次 🔄</button>`;
    setTimeout(()=>{const rb=document.getElementById('retryRdg');if(rb)rb.addEventListener('click',()=>{inp.value='';inp.disabled=false;inp.classList.remove('no');fb.className='fb';setTimeout(()=>inp.focus(),50);});},50);
  }
}

// rdg button bindings
document.getElementById('rdgModeRead').addEventListener('click',function(){rdgMode='read';renderRdg();});
document.getElementById('rdgModeFill').addEventListener('click',function(){rdgMode='fill';renderRdg();});
document.getElementById('rdgZhToggle').addEventListener('click',function(){
  rdgShowZh=!rdgShowZh;
  this.classList.toggle('on',rdgShowZh);
  if(rdgMode==='read'){
    document.querySelectorAll('#rdgArea .rdg-zh').forEach(el=>{el.style.display=rdgShowZh?'block':'none';});
  }
});
document.getElementById('btnCheckRdgFill').addEventListener('click',()=>{
  checkRdgFill(RDG[rdgFillIdx%RDG.length]);
});
document.getElementById('btnNextRdgFill').addEventListener('click',()=>{rdgFillIdx++;renderRdgFill();});
