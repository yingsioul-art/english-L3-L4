<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英文學習站 L3 · L4</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--card2:#f7f9fc;--border:#dde3ee;
  --shadow:0 2px 16px rgba(60,80,140,.10);
  --accent:#2d6be4;--accent2:#e05c5c;--teal:#1aaccf;
  --green:#27a86a;--purple:#7c5cbf;--gold:#d4920a;
  --text:#1a2340;--muted:#5a6a8a;--radius:14px;
  --font:'Microsoft YaHei','微軟雅黑','PingFang TC','Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.app{max-width:860px;margin:0 auto;padding:14px;}

.hdr{display:flex;align-items:center;justify-content:space-between;background:var(--accent);border-radius:var(--radius);padding:12px 18px;margin-bottom:10px;box-shadow:0 4px 18px rgba(45,107,228,.25);}
.logo{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;}
.logo span{color:#ffe082;}
.hdr-right{display:flex;gap:7px;}
.badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border-radius:100px;padding:4px 12px;font-size:12px;font-weight:800;color:#fff;}

/* LESSON SWITCHER */
.lesson-sw{display:flex;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:10px;box-shadow:var(--shadow);}
.lbtn{
  flex:1;padding:10px 8px;border:2px solid var(--border);border-radius:10px;
  background:var(--card2);color:var(--muted);font-family:var(--font);
  font-weight:900;font-size:13px;cursor:pointer;transition:all .2s;text-align:center;
}
.lbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(45,107,228,.3);}
.lbtn:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.lbtn .ltag{font-size:11px;opacity:.8;display:block;margin-top:2px;}

.unit-nav{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:7px;margin-bottom:10px;box-shadow:var(--shadow);}
.unav{padding:7px 3px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:var(--font);font-weight:800;font-size:10.5px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.unav .ui{font-size:17px;line-height:1;}
.unav.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(45,107,228,.3);}
.unav.done{color:var(--green);}
.unav:hover:not(.on){background:var(--card2);}

.panel{display:none;animation:fadeU .25s ease;}
.panel.on{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow);}
.stitle{font-family:'Fredoka One',cursive;font-size:17px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

.prog-wrap{background:var(--card2);border-radius:100px;height:7px;margin-bottom:12px;border:1px solid var(--border);}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .5s ease;}

.group-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.gpill{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:800;border:1.5px solid var(--border);color:var(--muted);background:var(--card2);cursor:pointer;transition:all .2s;}
.gpill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* FLASHCARD */
.fc-scene{perspective:1200px;cursor:pointer;margin-bottom:12px;min-height:210px;}
.fc-inner{position:relative;width:100%;min-height:210px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;width:100%;min-height:210px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.fc-front{background:linear-gradient(135deg,#e8f0ff,#f0f7ff);border:2px solid #c8d8f8;}
.fc-back{background:linear-gradient(135deg,#e6f7f0,#f0faf6);border:2px solid #b2e0cc;transform:rotateY(180deg);}
.fc-en{font-size:28px;font-weight:900;color:var(--accent);margin-bottom:5px;}
.fc-pos{font-size:11px;color:var(--accent2);font-weight:800;margin-bottom:3px;text-transform:uppercase;}
.fc-zh{font-size:20px;color:var(--text);font-weight:800;margin-bottom:3px;}
.fc-tip{font-size:11px;color:var(--muted);margin-top:6px;}
.fc-ex{font-size:13.5px;color:#2a6a4a;line-height:1.75;margin:7px 0;}
.fc-ex .kw{color:var(--accent);font-weight:900;border-bottom:2px solid var(--accent);}
.btn-row2{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:5px;}
.ic-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18s;}
.ic-btn:hover{border-color:var(--accent);color:var(--accent);background:#eef3ff;}
.ic-btn.purple{border-color:var(--purple);color:var(--purple);}
.ic-btn.purple:hover{background:#f0eeff;}
.chunk-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:8px;text-align:left;display:none;}
.chunk-box.on{display:block;animation:fadeU .2s ease;}
.chunk-ttl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--purple);font-weight:900;margin-bottom:7px;}
.chunk-item{font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);}
.chunk-item:last-child{border-bottom:none;}
.chunk-item b{color:var(--teal);}
.fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.fc-ctr{font-size:13px;color:var(--muted);font-weight:800;}

.btn{padding:8px 18px;border:none;border-radius:9px;font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;transition:all .18s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2558c8;transform:translateY(-1px);}
.btn-secondary{background:var(--card2);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-danger{background:#fef0f0;color:var(--accent2);border:1.5px solid #f8cccc;}
.action-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px;}

/* SPELLING */
.qblock{background:var(--card2);border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid var(--border);}
.qtext{font-size:14.5px;font-weight:800;line-height:1.6;margin-bottom:12px;}
.qtext .en-big{font-size:22px;color:var(--accent);display:block;margin:5px 0;}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.choice-btn{padding:10px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-weight:800;font-size:13.5px;cursor:pointer;transition:all .18s;text-align:left;}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#eef3ff;}
.choice-btn.ok{border-color:var(--green);background:#eefbf4;color:var(--green);}
.choice-btn.no{border-color:var(--accent2);background:#fef0f0;color:var(--accent2);}
.choice-btn.rev{border-color:var(--green);color:var(--green);}

.sp-hint{background:linear-gradient(90deg,#fff8e0,#fffbe8);border:1.5px solid #f0d060;border-radius:9px;padding:9px 14px;font-size:13.5px;text-align:center;margin-bottom:10px;}
.sp-hint .syl{color:var(--purple);font-weight:900;}
.sp-hint .hint-txt{color:var(--gold);font-weight:900;font-size:17px;letter-spacing:3px;}
.sp-input{width:100%;padding:11px 13px;background:#fff;border:2px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:17px;font-weight:800;text-align:center;letter-spacing:2px;outline:none;transition:border-color .2s;}
.sp-input:focus{border-color:var(--accent);}

.hw-label{font-size:24px;font-weight:900;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:2px;}
.hw-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px;}
#hwCanvas{border:2px solid var(--border);border-radius:12px;background:#fff;cursor:crosshair;display:block;margin:0 auto 8px;touch-action:none;}

.sent-en{font-size:15px;font-weight:800;line-height:1.7;margin-bottom:5px;}
.sent-en .hl{color:var(--accent);background:#e8f0ff;border-radius:4px;padding:1px 5px;border-bottom:2px solid var(--accent);}
.sent-zh{font-size:12px;color:var(--muted);margin-bottom:7px;}
.sent-task{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:9px;}
.textarea{width:100%;padding:10px 12px;background:#fff;border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font);font-size:13.5px;resize:none;min-height:65px;outline:none;transition:border-color .2s;}
.textarea:focus{border-color:var(--accent);}

.fb{margin-top:9px;padding:11px 13px;border-radius:9px;font-size:13px;line-height:1.75;display:none;}
.fb.on{display:block;animation:fadeU .25s ease;}
.fb.great{background:#eefbf4;border:1px solid #b2e0cc;}
.fb.good{background:#e8f5fb;border:1px solid #a8d8ee;}
.fb.retry{background:#fef0f0;border:1px solid #f8cccc;}
.fb-lv{font-weight:900;font-size:14px;margin-bottom:3px;}
.fb.great .fb-lv{color:var(--green);}
.fb.good .fb-lv{color:var(--teal);}
.fb.retry .fb-lv{color:var(--accent2);}

.gram-q{font-size:14.5px;font-weight:800;line-height:1.7;margin-bottom:12px;}
.gram-blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--accent);margin:0 4px;vertical-align:bottom;}
.gram-exp{margin-top:9px;padding:11px 13px;background:#fffbe8;border-radius:8px;font-size:13px;line-height:1.75;display:none;border-left:4px solid var(--gold);color:#6a4800;}
.gram-exp.on{display:block;}

.passage{background:#f5fbf8;border-radius:12px;padding:15px;font-size:13.5px;line-height:2.1;margin-bottom:12px;border:1px solid #b2e0cc;border-left:4px solid var(--green);}
.ptitle{font-family:'Fredoka One',cursive;font-size:14px;color:var(--green);margin-bottom:8px;}
.opts-row{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0;}
.obtn{padding:6px 13px;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-weight:800;font-size:13px;cursor:pointer;transition:all .18s;}
.obtn:hover:not(:disabled){border-color:var(--teal);background:#e8f8f4;}
.obtn.o-ok{border-color:var(--green);color:var(--green);background:#eefbf4;}
.obtn.o-no{border-color:var(--accent2);color:var(--accent2);background:#fef0f0;}
.exp-box{margin-top:5px;padding:8px 12px;background:#eefbf4;border-radius:8px;font-size:13px;color:#2a6a4a;border:1px solid #b2e0cc;display:none;}
.cap-note{margin-top:9px;padding:10px 13px;font-size:13px;color:#0a5a7a;background:#e8f5fb;border:1px solid #a8d8ee;border-radius:9px;}
.cap-badge{display:inline-flex;align-items:center;gap:5px;background:#fef0f0;border:1px solid #f8cccc;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:900;color:var(--accent2);margin-bottom:9px;}
.order-bar{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:7px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;}
.order-bar label{font-size:12px;color:var(--muted);font-weight:800;flex:1;}
.order-btn{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--font);font-weight:800;font-size:12px;cursor:pointer;transition:all .18px;}
.order-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.order-btn:hover:not(.on){border-color:var(--accent);color:var(--accent);}
.wnum{display:inline-block;min-width:28px;font-size:12px;color:var(--muted);font-weight:800;vertical-align:middle;}

.xp-pop{position:fixed;top:64px;right:16px;z-index:999;background:var(--gold);color:#fff;font-family:'Fredoka One',cursive;font-size:15px;padding:5px 14px;border-radius:100px;box-shadow:0 4px 14px rgba(212,146,10,.4);animation:xpUp 1.4s ease forwards;pointer-events:none;}
@keyframes xpUp{0%{opacity:0;transform:translateY(14px) scale(.85);}20%{opacity:1;transform:translateY(-8px) scale(1.1);}70%{opacity:1;transform:translateY(-24px);}100%{opacity:0;transform:translateY(-42px) scale(.9);}}
@keyframes fadeU{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.summary{background:linear-gradient(135deg,#e6fbf0,#eef7ff);border:2px solid var(--green);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:12px;display:none;}
.summary.on{display:block;animation:fadeU .4s ease;}
.sum-title{font-family:'Fredoka One',cursive;font-size:21px;color:var(--green);margin-bottom:10px;}
.sum-row{display:flex;justify-content:center;gap:24px;margin:12px 0;}
.snum{font-family:'Fredoka One',cursive;font-size:32px;color:var(--accent);}
.slbl{font-size:11px;color:var(--muted);font-weight:800;}

@media(max-width:580px){.choice-grid{grid-template-columns:1fr;}.unit-nav{grid-template-columns:repeat(4,1fr);}.sum-row{gap:14px;}}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="logo">英文<span>學習站</span> 📚</div>
  <div class="hdr-right">
    <div class="badge">⭐ <span id="xpEl">0</span></div>
    <div class="badge">🔥 <span id="strkEl">0</span>天</div>
  </div>
</header>

<!-- LESSON SWITCHER -->
<div class="lesson-sw" id="lessonSw">
  <button class="lbtn on" data-lesson="L3">
    📖 第三課
    <span class="ltag">How Do You Celebrate the New Year?</span>
  </button>
  <button class="lbtn" data-lesson="L4">
    📖 第四課
    <span class="ltag">How Much Paper Do We Need?</span>
  </button>
</div>

<!-- UNIT NAV -->
<nav class="unit-nav" id="unitNav">
  <button class="unav on" data-unit="1"><span class="ui">🃏</span>單字卡</button>
  <button class="unav" data-unit="2"><span class="ui">🔤</span>拼字①</button>
  <button class="unav" data-unit="3"><span class="ui">✏️</span>拼字②</button>
  <button class="unav" data-unit="4"><span class="ui">✍️</span>拼字③</button>
  <button class="unav" data-unit="5"><span class="ui">💬</span>句型</button>
  <button class="unav" data-unit="6"><span class="ui">⚙️</span>文法</button>
  <button class="unav" data-unit="7"><span class="ui">📖</span>閱讀</button>
</nav>

<!-- P1 FLASHCARDS -->
<div class="panel on" id="p1">
  <div class="card">
    <div class="stitle" id="stitle1">🃏 單字卡</div>
    <div class="group-pills" id="groupPills"></div>
    <div class="prog-wrap"><div class="prog-fill" id="fcProg" style="width:0%"></div></div>
    <div class="fc-scene" id="fcScene">
      <div class="fc-inner" id="fcInner">
        <div class="fc-face fc-front">
          <div class="fc-pos" id="fcPos"></div>
          <div class="fc-en" id="fcEn"></div>
          <div class="fc-zh" id="fcZh"></div>
          <div class="fc-tip">👆 點卡翻面看例句</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-pos" id="fcPosB" style="color:var(--purple)"></div>
          <div style="font-size:19px;font-weight:900;color:var(--teal);margin-bottom:7px;" id="fcEnB"></div>
          <div class="fc-ex" id="fcEx"></div>
          <div class="btn-row2">
            <button class="ic-btn" id="btnSndWord">🔊 單字</button>
            <button class="ic-btn" id="btnSndEx">🔊 例句</button>
            <button class="ic-btn purple" id="btnChunk">💡 語塊</button>
          </div>
          <div class="chunk-box" id="chunkBox">
            <div class="chunk-ttl">🌐 母語人士常用語塊</div>
            <div id="chunkList"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button class="btn btn-secondary" id="btnPrev">← 上一張</button>
      <span class="fc-ctr" id="fcCtr">1 / 39</span>
      <button class="btn btn-primary" id="btnNext">下一張 →</button>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn btn-secondary" id="btnShuffle" style="font-size:12px;">🔀 隨機洗牌</button>
    </div>
  </div>
</div>

<!-- P2 SPELLING 1 -->
<div class="panel" id="p2">
  <div class="card">
    <div class="stitle">🔤 拼字①：認識單字意思</div>
    <div class="prog-wrap"><div class="prog-fill" id="s1Prog" style="width:0%"></div></div>
    <div class="order-bar">
      <label>排列順序：</label>
      <button class="order-btn on" id="s1BtnSeq">📋 課本原序</button>
      <button class="order-btn" id="s1BtnShuffle">🔀 隨機洗牌</button>
    </div>
    <div id="s1Area"></div>
    <div class="action-row"><button class="btn btn-secondary" id="btnNextS1">換一題 →</button></div>
  </div>
</div>

<!-- P3 SPELLING 2 -->
<div class="panel" id="p3">
  <div class="card">
    <div class="stitle">✏️ 拼字②：依提示拼寫</div>
    <div class="prog-wrap"><div class="prog-fill" id="s2Prog" style="width:0%"></div></div>
    <div class="order-bar">
      <label>排列順序：</label>
      <button class="order-btn on" id="s2BtnSeq">📋 課本原序</button>
      <button class="order-btn" id="s2BtnShuffle">🔀 隨機洗牌</button>
    </div>
    <div id="s2Area"></div>
    <div class="action-row">
      <button class="btn btn-primary" id="btnCheckS2">確認 ✓</button>
      <button class="btn btn-secondary" id="btnNextS2">換一題 →</button>
    </div>
  </div>
</div>

<!-- P4 SPELLING 3 -->
<div class="panel" id="p4">
  <div class="card">
    <div class="stitle">✍️ 拼字③：手寫拼字</div>
    <div class="prog-wrap"><div class="prog-fill" id="s3Prog" style="width:0%"></div></div>
    <div class="order-bar">
      <label>排列順序：</label>
      <button class="order-btn on" id="s3BtnSeq">📋 課本原序</button>
      <button class="order-btn" id="s3BtnShuffle">🔀 隨機洗牌</button>
    </div>
    <div id="s3Area"></div>
    <div class="action-row">
      <button class="btn btn-primary" id="btnCheckS3">確認 ✓</button>
      <button class="btn btn-danger" id="btnClear">清除 ✕</button>
      <button class="btn btn-secondary" id="btnNextS3">換一題 →</button>
    </div>
  </div>
</div>

<!-- P5 SENTENCES -->
<div class="panel" id="p5">
  <div class="card">
    <div class="stitle">💬 課文句型練習</div>
    <div class="prog-wrap"><div class="prog-fill" id="sentProg" style="width:0%"></div></div>
    <div id="sentArea"></div>
    <div class="action-row">
      <button class="btn btn-primary" id="btnCheckSent">送出 ✓</button>
      <button class="btn btn-secondary" id="btnNextSent">換一題 →</button>
    </div>
  </div>
</div>

<!-- P6 GRAMMAR -->
<div class="panel" id="p6">
  <div class="card">
    <div class="stitle" id="gramTitle">⚙️ 文法挑戰</div>
    <div class="prog-wrap"><div class="prog-fill" id="gramProg" style="width:0%"></div></div>
    <div id="gramArea"></div>
    <div class="action-row"><button class="btn btn-secondary" id="btnNextGram">換一題 →</button></div>
  </div>
</div>

<!-- P7 READING -->
<div class="panel" id="p7">
  <div class="card">
    <div class="stitle">📖 閱讀克漏字 <span style="font-size:12px;color:var(--muted);font-weight:400;">類會考</span></div>
    <div id="readArea"></div>
  </div>
</div>

<div class="summary" id="summary">
  <div class="sum-title" id="sumTitle">🎉 今日練習完成！</div>

        <button class="ic-btn" id="s1snd" style="margin-left:6px;">🔊 發音</button></div>
      </div>

        ${opts.map((o,i)=>`<button class="choice-btn" data-correct="${o.id===w.id}" data-zh="${w.zh}">${o.zh}</button>`).join('')}
      </div>
      <div class="fb" id="s1fb"></div>
    </div>`;
  document.getElementById('s1snd').addEventListener('click',e=>{e.stopPropagation();speak(w.en);});
  document.querySelectorAll('#s1Area .choice-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('#s1Area .choice-btn').forEach(b=>b.disabled=true);
      const ok=this.dataset.correct==='true';
      this.classList.add(ok?'ok':'no');
      if(!ok)document.querySelectorAll('#s1Area .choice-btn').forEach(b=>{if(b.textContent.trim()===w.zh)b.classList.add('rev');});
      const fb=document.getElementById('s1fb');

      if(ok){addXP(5);s1Score++;setProg('s1Prog',Math.round(Math.min(s1Score,39)/39*100));markDone(2);}
    });
  });

function initCanvas(w){
  canvas=document.getElementById('hwCanvas');
  if(!canvas)return;
  const maxW=Math.min(480,document.querySelector('.app').offsetWidth-52);
  canvas.width=maxW;canvas.height=120;
  ctx=canvas.getContext('2d');
  function drawLine(){ctx.save();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,88);ctx.lineTo(canvas.width-10,88);ctx.stroke();ctx.restore();}
  drawLine();
  ctx.strokeStyle='#1a2340';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';
  drawing=false;canvas._w=w;
  function pos(e){const r=canvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
  canvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('mouseleave',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
}
document.getElementById('btnClear').addEventListener('click',()=>{
  if(canvas&&ctx){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(10,88);ctx.lineTo(canvas.width-10,88);ctx.stroke();ctx.restore();ctx.strokeStyle='#1a2340';ctx.lineWidth=3;}
});
document.getElementById('btnCheckS3').addEventListener('click',()=>{
  const w=canvas?canvas._w:s3Pool[s3Used%s3Pool.length];
  const fb=document.getElementById('s3fb');
  fb.className='fb on good';
  fb.innerHTML=`<div class="fb-lv">👍 對照答案</div>正確拼法：<span style="font-size:21px;color:var(--accent);font-weight:900;letter-spacing:2px">${w.en}</span>
    <span style="font-size:12px;color:var(--muted);margin-left:8px;">（${w.syl}）</span><br>
    <div style="margin-top:7px;display:flex;gap:7px;flex-wrap:wrap;">
      <button class="ic-btn" id="s3snd">🔊 聽發音</button>
      <button class="btn btn-primary" id="btnOK" style="font-size:12px;">✓ 我寫對了</button>
      <button class="btn btn-danger" id="btnNG" style="font-size:12px;">✗ 寫錯了</button>
    </div>`;
  document.getElementById('s3snd').addEventListener('click',()=>speak(w.en));
  document.getElementById('btnOK').addEventListener('click',()=>{addXP(10);s3Score++;setProg('s3Prog',Math.round(Math.min(s3Score,39)/39*100));markDone(4);s3Used++;renderS3();});
  document.getElementById('btnNG').addEventListener('click',()=>{s3Used++;renderS3();});
});
document.getElementById('btnNextS3').addEventListener('click',()=>{s3Used++;renderS3();});

function renderSent(){
  const s=SENTS[sentIdx%SENTS.length];
  const enHtml=s.en.replace(/<hl>(.*?)<\/hl>/g,'<span class="hl">$1</span>');
  document.getElementById('sentArea').innerHTML=`
    <div class="qblock">
      <div class="sent-en">${enHtml}</div>
      <div class="sent-zh">（${s.zh}）</div>
      <div class="sent-task">${s.task}</div>
      <textarea class="textarea" id="saEl" placeholder="在這裡輸入你的想法…"></textarea>
      <div class="fb" id="sfb"></div>
    </div>`;
}
document.getElementById('btnCheckSent').addEventListener('click',()=>{
  const s=SENTS[sentIdx%SENTS.length];
  const ans=(document.getElementById('saEl').value||'').toLowerCase();
  const hits=s.keys.filter(k=>ans.includes(k.toLowerCase())).length;
  const fb=document.getElementById('sfb');
  fb.classList.add('on');
  if(hits>=2||ans.length>20){
    fb.className='fb on great';
    fb.innerHTML=`<div class="fb-lv">🌟 讚！</div>你抓到了重點！<br><span style="color:var(--teal)">補充：</span>${s.hint}`;
    addXP(10);sentScore++;setProg('sentProg',Math.round(Math.min(sentScore,SENTS.length)/SENTS.length*100));markDone(5);
  } else if(hits>=1||ans.length>12){
    fb.className='fb on good';
    fb.innerHTML=`<div class="fb-lv">👍 方向對！</div>可以補充：<br><span style="color:var(--teal)">${s.hint}</span>`;
    addXP(5);sentScore++;setProg('sentProg',Math.round(Math.min(sentScore,SENTS.length)/SENTS.length*100));
  } else {
    fb.className='fb on retry';
    fb.innerHTML=`<div class="fb-lv">💪 再想想</div>${s.hint}<br>
      <button class="btn btn-secondary" id="retryBtn" style="margin-top:6px;font-size:12px;">再試一次 🔄</button>`;
    setTimeout(()=>{const rb=document.getElementById('retryBtn');if(rb)rb.addEventListener('click',()=>{document.getElementById('saEl').value='';document.getElementById('sfb').className='fb';});},50);
  }
});
document.getElementById('btnNextSent').addEventListener('click',()=>{sentIdx++;renderSent();});

function renderGram(){
  const q=GRAMS[gramIdx%GRAMS.length];
  const qHtml=q.q.replace('_____','<span class="gram-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  document.getElementById('gramArea').innerHTML=`
    <div class="qblock">
      <div class="gram-q">請選出正確答案：<br><br>${qHtml}</div>
      <div class="choice-grid">
        ${q.cs.map((c,i)=>`<button class="choice-btn" data-i="${i}">${String.fromCharCode(65+i)}. ${c}</button>`).join('')}
      </div>
      <div class="gram-exp" id="gexp">${q.exp.replace(/\n/g,'<br>')}</div>
    </div>`;
  document.querySelectorAll('#gramArea .choice-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('#gramArea .choice-btn').forEach(b=>b.disabled=true);
      const i=parseInt(this.dataset.i);
      if(i===q.ans){
        this.classList.add('ok');
        addXP(10);gramScore++;setProg('gramProg',Math.round(Math.min(gramScore,GRAMS.length)/GRAMS.length*100));markDone(6);
      } else {
        this.classList.add('no');
        document.querySelectorAll('#gramArea .choice-btn')[q.ans].classList.add('rev');
      }
      document.getElementById('gexp').classList.add('on');
    });
  });
}
document.getElementById('btnNextGram').addEventListener('click',()=>{gramIdx++;renderGram();});

function renderRead(){
  let p=READ.passage;
  READ.blanks.forEach(b=>{p=p.replace(`(${b.num})_____`,`<strong style="color:var(--accent)">(${b.num})</strong>`);});
  const blanksHtml=READ.blanks.map((b,i)=>`
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:800;margin-bottom:6px;">空格 (${b.num}) 最佳答案：</div>
      <div class="opts-row" id="opt${i}">
        ${b.opts.map((o,j)=>`<button class="obtn" data-qi="${i}" data-j="${j}" data-ans="${b.ans}" data-exp="${encodeURIComponent(b.exp)}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
      <div class="exp-box" id="rex${i}"></div>
    </div>`).join('');
  document.getElementById('readArea').innerHTML=`
    <div class="cap-badge">🏆 類會考克漏字</div>
    <div class="passage"><div class="ptitle">${READ.title}</div>${p}</div>
    <div style="font-family:'Fredoka One',cursive;font-size:14px;color:var(--accent);margin-bottom:10px;">選出最佳答案：</div>
    ${blanksHtml}
    <div class="cap-note">${READ.cap}</div>`;
  document.querySelectorAll('.obtn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const qi=parseInt(this.dataset.qi),j=parseInt(this.dataset.j);
      const ans=parseInt(this.dataset.ans),exp=decodeURIComponent(this.dataset.exp);
      document.querySelectorAll(`#opt${qi} .obtn`).forEach(b=>b.disabled=true);
      this.classList.add(j===ans?'o-ok':'o-no');
      if(j!==ans)document.querySelector(`#opt${qi} [data-j="${ans}"]`).classList.add('o-ok');
      const box=document.getElementById('rex'+qi);box.textContent='✅ '+exp;box.style.display='block';
      if(j===ans){addXP(8);readDone++;if(readDone===READ.blanks.length)markDone(7);}
    });
  });
}

function setProg(id,pct){const el=document.getElementById(id);if(el)el.style.width=pct+'%';}
function markDone(unit){
  const btn=document.querySelector(`[data-unit="${unit}"]`);
  if(btn)btn.classList.add('done');
  if(document.querySelectorAll('.unav.done').length>=5){
    document.getElementById('summary').classList.add('on');
    document.getElementById('sXP').textContent=XP;
    document.getElementById('sFlip').textContent=flipCount;
    document.getElementById('sSpell').textContent=s1Score+s2Score+s3Score;
    document.getElementById('summary').scrollIntoView({behavior:'smooth'});
  }
}
function shuffle(arr){return arr.sort(()=>Math.random()-.5);}
function speak(txt){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}

applyLesson('L3');
fcList=[...W];
showCard();
initS1();
</script>
